name: Validate skills

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4.3.1

      - name: Set up Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.12"

      - name: Install validator dependency
        run: python -m pip install PyYAML==6.0.2

      - name: Validate skill structure, manifests, metadata, and links
        run: python scripts/validate.py

      - name: Compile validator
        run: python -m py_compile scripts/validate.py

      - name: List skills through the public CLI
        run: npx --yes skills@1.5.15 add . --list
